<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online</title>
    <link rel="stylesheet" href="style.css">
    <!-- Icon dari Google Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">TokoKita</div>
        <div class="cart-icon" id="cart-btn">
            <span class="material-icons">shopping_cart</span>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <!-- Daftar Produk -->
    <div class="container">
        <h2>Katalog Produk</h2>
        <div id="product-list" class="product-grid">
            <p style="text-align:center; width:100%;">Memuat produk...</p>
        </div>
    </div>

    <!-- Modal Keranjang & Checkout -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2>Keranjang Belanja</h2>
            
            <div id="cart-items" class="cart-items"></div>

            <div id="checkout-form" class="checkout-form" style="display: none;">
                <h3>Data Pengiriman</h3>
                <input type="text" id="name" placeholder="Nama Lengkap" required>
                <input type="tel" id="phone" placeholder="No. WhatsApp" required>
                <textarea id="address" placeholder="Alamat Lengkap" rows="3" required></textarea>
                
                <label>Pilih Kurir:</label>
                <select id="courier">
                    <option value="jne">JNE (Rp 10.000)</option>
                    <option value="pos">POS (Rp 12.000)</option>
                    <option value="tiki">TIKI (Rp 15.000)</option>
                </select>

                <div class="summary">
                    <p>Subtotal: <span id="subtotal">Rp 0</span></p>
                    <p>Ongkir: <span id="shipping-cost">Rp 0</span></p>
                    <p class="total">Total: <span id="grand-total">Rp 0</span></p>
                </div>

                <button id="btn-wa" class="btn-wa">
                    <span class="material-icons">whatsapp</span> Order via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
