<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Toko Online (Demo)</title>
    <link rel="icon" href="assets/logo-fav.png">
    <!-- Icon dari Google Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* CSS dari style.css */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f4f4; padding-bottom: 50px; }
        
        /* Navbar */
        .navbar { background: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; }
        .logo img { max-height: 40px; }
        .cart-icon { position: relative; cursor: pointer; }
        #cart-count { position: absolute; top: -8px; right: -8px; background: #e74c3c; color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.8rem; }
        
        /* Product Grid */
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; }
        .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 150px; object-fit: cover; background: #ddd; }
        .product-info { padding: 15px; }
        .product-title { font-size: 1rem; margin-bottom: 5px; font-weight: bold; }
        .product-price { color: #27ae60; font-weight: bold; margin-bottom: 10px; }
        .btn-add { width: 100%; background: #3498db; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .btn-add:hover { background: #2980b9; }
        
        /* Modal Keranjang */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 8px; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; }
        
        /* Cart Items */
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .qty-controls button { background: #eee; border: none; width: 25px; height: 25px; cursor: pointer; }
        
        /* Form Checkout */
        .checkout-form { margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .checkout-form input, .checkout-form textarea, .checkout-form select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .summary { background: #f9f9f9; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .total { font-weight: bold; font-size: 1.2rem; color: #2c3e50; border-top: 1px solid #ddd; margin-top: 5px; padding-top: 5px;}
        .btn-wa { width: 100%; background: #25D366; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-wa:hover { background: #128C7E; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo"><img src="assets/logo.png" alt="Service Komputer Surabaya"></div>
        <div class="cart-icon" id="cart-btn">
            <span class="material-icons">shopping_cart</span>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <!-- Daftar Produk -->
    <div class="container">
        <h2>Katalog Produk</h2>
        <input type="text" id="search-input" class="search-box" placeholder="Cari produk...">
        <div id="product-list" class="product-grid"></div>
    </div>

    <!-- Modal Keranjang & Checkout -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2>Keranjang Belanja</h2>
            
            <div id="cart-items" class="cart-items"></div>

            <div id="checkout-form" class="checkout-form" style="display: none;">
                <h3>Data Pengiriman</h3>
                <input type="text" id="name" placeholder="Nama Lengkap" required>
                <input type="tel" id="phone" placeholder="No. WhatsApp" required>
                <textarea id="address" placeholder="Alamat Lengkap" rows="3" required></textarea>
                
                <label>Pilih Kurir:</label>
                <select id="courier">
                    <option value="jne">JNE (Rp 10.000)</option>
                    <option value="pos">POS (Rp 12.000)</option>
                    <option value="tiki">TIKI (Rp 15.000)</option>
                </select>

                <label>Metode Order:</label>
                <select id="order-method">
                    <option value="whatsapp">WhatsApp</option>
                    <option value="print">Cetak Penawaran (Print/PDF)</option>
                </select>

                <div class="summary">
                    <p>Subtotal: <span id="subtotal">Rp 0</span></p>
                    <p>Ongkir: <span id="shipping-cost">Rp 0</span></p>
                    <p class="total">Total: <span id="grand-total">Rp 0</span></p>
                </div>

                <button id="btn-checkout" class="btn-wa">
                    <span class="material-icons">send</span> Proses Order
                </button>
            </div>
        </div>
    </div>

    <script>
        // DATA DUMMY (MOCK DATA) - Menggantikan Firebase untuk Simulasi
        const products = [
            { id: '1', name: 'Laptop Gaming ASUS', price: 15000000, image: 'https://via.placeholder.com/150/0000FF/808080?text=Laptop' },
            { id: '2', name: 'Mouse Wireless Logitech', price: 150000, image: 'https://via.placeholder.com/150/FF0000/FFFFFF?text=Mouse' },
            { id: '3', name: 'Keyboard Mechanical', price: 500000, image: 'https://via.placeholder.com/150/FFFF00/000000?text=Keyboard' },
            { id: '4', name: 'Monitor LG 24 Inch', price: 2000000, image: 'https://via.placeholder.com/150/008000/FFFFFF?text=Monitor' },
            { id: '5', name: 'Headset Gaming', price: 350000, image: 'https://via.placeholder.com/150/800080/FFFFFF?text=Headset' },
        ];

        let cart = JSON.parse(localStorage.getItem("cart_sim")) || [];

        function renderProducts(data = products) {
            const productList = document.getElementById('product-list');
            if (data.length === 0) {
                productList.innerHTML = '<p style="text-align:center; width:100%;">Produk tidak ditemukan.</p>';
                return;
            }

            productList.innerHTML = data.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-img">
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <p class="product-price">Rp ${product.price.toLocaleString('id-ID')}</p>
                        <button class="btn-add" onclick="addToCart('${product.id}')">
                            + Keranjang
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            saveCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem("cart_sim", JSON.stringify(cart));
        }

        function updateCartUI() {
            const totalQty = cart.reduce((acc, item) => acc + item.qty, 0);
            document.getElementById('cart-count').innerText = totalQty;

            const cartItemsContainer = document.getElementById('cart-items');
            const checkoutForm = document.getElementById('checkout-form');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p>Keranjang masih kosong.</p>';
                checkoutForm.style.display = 'none';
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <h4>${item.name}</h4>
                            <small>Rp ${item.price.toLocaleString('id-ID')}</small>
                        </div>
                        <div class="qty-controls">
                            <button onclick="changeQty('${item.id}', -1)">-</button>
                            <span>${item.qty}</span>
                            <button onclick="changeQty('${item.id}', 1)">+</button>
                        </div>
                    </div>
                `).join('');
                checkoutForm.style.display = 'block';
                calculateTotal();
            }
        }

        function changeQty(id, change) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            saveCart();
            updateCartUI();
        }

        function calculateTotal() {
            const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const courierSelect = document.getElementById('courier');
            let shippingCost = 0;
            if(courierSelect.value === 'jne') shippingCost = 10000;
            else if(courierSelect.value === 'pos') shippingCost = 12000;
            else if(courierSelect.value === 'tiki') shippingCost = 15000;

            const total = subtotal + shippingCost;
            document.getElementById('subtotal').innerText = `Rp ${subtotal.toLocaleString('id-ID')}`;
            document.getElementById('shipping-cost').innerText = `Rp ${shippingCost.toLocaleString('id-ID')}`;
            document.getElementById('grand-total').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            return { subtotal, shippingCost, total };
        }

        function processCheckout() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const courier = document.getElementById('courier').value.toUpperCase();
            const orderMethod = document.getElementById('order-method').value;

            if (!name || !phone || !address) {
                alert("Mohon lengkapi data diri Anda!");
                return;
            }

            const { subtotal, shippingCost, total } = calculateTotal();
            let productListText = cart.map((item, idx) => 
                `${idx + 1}. ${item.name} (${item.qty}x) - Rp ${(item.price * item.qty).toLocaleString('id-ID')}`
            ).join('\n');

            const messageWA = `*Halo Admin, Saya mau order!*

*Data Penerima:*
Nama: ${name}
No HP: ${phone}
Alamat: ${address}
Kurir: ${courier}

*Pesanan:*
${productListText}
---------------------------
Subtotal: Rp ${subtotal.toLocaleString('id-ID')}
Ongkir: Rp ${shippingCost.toLocaleString('id-ID')}
*Total Bayar: Rp ${total.toLocaleString('id-ID')}*

Silakan transfer ke:
BCA: 1010836642
BRI: 717901010257532
An. Indah Wahyuning Aprilia

Terima kasih!`;

            if (orderMethod === 'whatsapp') {
                const adminPhone = "628994335111"; 
                window.open(`https://api.whatsapp.com/send/?phone=${adminPhone}&text=${encodeURIComponent(messageWA)}`, '_blank');
            } else if (orderMethod === 'print') {
                printInvoice({ name, phone, address, courier, subtotal, shippingCost, total, cart });
            }
        }

        function printInvoice(data) {
            const date = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            const itemsHtml = data.cart.map((item, i) => `
                <tr>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align: center;">${i + 1}</td>
                    <td style="padding: 8px; border: 1px solid #ddd;">${item.name}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align: center;">${item.qty}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align: right;">Rp ${item.price.toLocaleString('id-ID')}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align: right;">Rp ${(item.price * item.qty).toLocaleString('id-ID')}</td>
                </tr>
            `).join('');

            const html = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Penawaran Harga - TokoKita</title>
                <style>
                    body { font-family: sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; }
                    .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 20px; }
                    .info { margin-bottom: 30px; }
                    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                    th { background: #f4f4f4; padding: 10px; border: 1px solid #ddd; font-weight: bold; }
                    .totals { text-align: right; margin-top: 20px; }
                    .totals p { margin: 5px 0; }
                    .footer { margin-top: 50px; text-align: center; font-size: 0.8rem; color: #666; border-top: 1px solid #eee; padding-top: 20px; }
                    @media print { 
                        .no-print { display: none; }
                        @page { margin: 0; }
                        body { margin: 2cm; }
                    }
                </style>
            </head>
            <body>
                <div class="header">
                    <img src="assets/logo.png" alt="Service Komputer Surabaya" style="max-width: 250px; margin-bottom: 10px;">
                    <p>Pusat Komputer & Aksesoris Terlengkap</p>
                </div>
                
                <div class="info">
                    <p><strong>Tanggal:</strong> ${date}</p>
                    <p><strong>Kepada Yth:</strong> ${data.name}</p>
                    <p><strong>No HP:</strong> ${data.phone}</p>
                    <p><strong>Alamat:</strong> ${data.address}</p>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Produk</th>
                            <th>Qty</th>
                            <th>Harga Satuan</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHtml}
                    </tbody>
                </table>

                <div class="totals">
                    <p>Subtotal: Rp ${data.subtotal.toLocaleString('id-ID')}</p>
                    <p>Ongkir (${data.courier}): Rp ${data.shippingCost.toLocaleString('id-ID')}</p>
                    <h3>Total: Rp ${data.total.toLocaleString('id-ID')}</h3>
                </div>

                <div class="footer">
                    <p>Dokumen ini adalah penawaran harga yang sah (Quotation).</p>
                    
                    <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                        <h3>Info Pembayaran</h3>
                        <div style="display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; text-align: center;">
                            <div>
                                <img src="assets/bank-bca.png" style="height: 40px; display: block; margin: 0 auto 5px;">
                                <p style="margin: 2px 0;"><strong>1010836642</strong></p>
                                <p style="margin: 0; font-size: 0.9em;">Indah Wahyuning Aprilia</p>
                            </div>
                            <div>
                                <img src="assets/bank-bri.png" style="height: 40px; display: block; margin: 0 auto 5px;">
                                <p style="margin: 2px 0;"><strong>717901010257532</strong></p>
                                <p style="margin: 0; font-size: 0.9em;">Indah Wahyuning Aprilia</p>
                            </div>
                            <div>
                                <img src="assets/qris.png" style="max-width: 70px; border: 1px solid #ddd; display: block; margin: 0 auto 5px;">
                                <p style="margin: 0;"><strong>QRIS</strong></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="no-print" style="text-align: center; margin-top: 30px;">
                    <button onclick="window.print()" style="padding: 12px 24px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 4px; font-size: 16px;">Cetak / Simpan PDF</button>
                </div>
            </body>
            </html>
            `;

            const printWindow = window.open('', '_blank');
            printWindow.document.write(html);
            printWindow.document.close();
        }

        // Event Listeners
        document.getElementById('cart-btn').addEventListener('click', () => {
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        });
        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('cart-modal').style.display = 'none';
        });
        document.getElementById('courier').addEventListener('change', calculateTotal);
        document.getElementById('btn-checkout').addEventListener('click', processCheckout);

        // Search Listener
        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(keyword));
            renderProducts(filtered);
        });

        // Init
        renderProducts();
        updateCartUI();
    </script>
</body>
</html>
