<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online - Service Komputer Surabaya ID</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/logo-fav.png">
    <!-- Icon dari Google Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo"><img src="assets/logo.png" alt="Service Komputer Surabaya"></div>
        <div style="display:flex; gap:20px; align-items:center;">
            <!-- Auth Buttons -->
            <div id="auth-container" style="display:flex; align-items:center; gap:10px;">
                <span id="user-name" style="font-weight:bold; display:none; font-size:0.9rem;"></span>
                <button id="btn-login-nav" class="btn-add" style="width:auto; padding:5px 15px; background:#f39c12;">Login</button>
                <button id="btn-history-nav" class="btn-add" style="width:auto; padding:5px 15px; background:#2980b9; display:none;">Riwayat</button>
                <button id="btn-logout-nav" class="btn-add" style="width:auto; padding:5px 15px; background:#e74c3c; display:none;">Logout</button>
            </div>
            <span style="cursor:pointer; font-weight:bold;" id="track-btn">Cek Resi</span>
            <div class="wishlist-icon" id="wishlist-btn">
                <span class="material-icons">favorite</span>
                <span id="wishlist-count">0</span>
            </div>
            <div class="cart-icon" id="cart-btn">
                <span class="material-icons">shopping_cart</span>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <!-- Daftar Produk -->
    <div class="container">
        <h2>Katalog Produk</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="search-input" class="search-box" placeholder="Cari produk..." style="margin-bottom: 0; flex: 1;">
            <select id="sort-select" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: auto;">
                <option value="default">Urutkan</option>
                <option value="price-asc">Harga Termurah</option>
                <option value="price-desc">Harga Termahal</option>
                <option value="name-asc">Nama A-Z</option>
                <option value="name-desc">Nama Z-A</option>
            </select>
        </div>
        
        <!-- Menu Kategori Horizontal -->
        <div id="category-list" class="category-menu"></div>

        <!-- Area Produk -->
        <div id="product-list">
            <p style="text-align:center; width:100%;">Memuat produk...</p>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination"></div>
    </div>

    <!-- Modal Keranjang & Checkout -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2>Keranjang Belanja</h2>
            
            <div id="cart-items" class="cart-items"></div>

            <div id="checkout-form" class="checkout-form" style="display: none;">
                <h3>Data Pengiriman</h3>
                <input type="text" id="name" placeholder="Nama Lengkap" required>
                <input type="tel" id="phone" placeholder="No. WhatsApp" required>
                <textarea id="address" placeholder="Alamat Lengkap" rows="3" required></textarea>
                
                <label>Provinsi:</label>
                <select id="provinsi">
                    <option value="">Pilih Provinsi</option>
                </select>

                <label>Kabupaten / Kota:</label>
                <select id="kabupaten" disabled>
                    <option value="">Pilih Kabupaten/Kota</option>
                </select>

                <label>Kecamatan:</label>
                <select id="kecamatan" disabled>
                    <option value="">Pilih Kecamatan</option>
                </select>

                <label>Kelurahan / Desa:</label>
                <select id="kelurahan" disabled>
                    <option value="">Pilih Kelurahan/Desa</option>
                </select>

                <label>Pilih Kurir:</label>
                <select id="courier">
                    <option value="">Pilih Kurir</option>
                </select>

                <label>Metode Order:</label>
                <select id="order-method">
                    <option value="whatsapp">WhatsApp</option>
                    <option value="print">Cetak Penawaran (Print/PDF)</option>
                </select>

                <div class="summary">
                    <p>Subtotal: <span id="subtotal">Rp 0</span></p>
                    <p>Total Berat: <span id="total-weight">0 Kg</span></p>
                    <p>Ongkir: <span id="shipping-cost">Rp 0</span></p>
                    <p class="total">Total: <span id="grand-total">Rp 0</span></p>
                </div>

                <button id="btn-checkout" class="btn-wa">
                    <span class="material-icons">send</span> Proses Order
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Wishlist -->
    <div id="wishlist-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-wishlist">&times;</span>
            <h2>Wishlist Saya</h2>
            <div id="wishlist-items" class="cart-items"></div>
            <button onclick="document.getElementById('wishlist-modal').style.display='none'" class="btn-add" style="margin-top:15px; background:#95a5a6;">Tutup</button>
        </div>
    </div>

    <!-- Modal Cek Resi -->
    <div id="track-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-track">&times;</span>
            <h2>Lacak Paket</h2>
            <div class="checkout-form">
                <select id="track-courier">
                    <option value="">Pilih Kurir</option>
                    <option value="jne">JNE</option>
                    <option value="pos">POS Indonesia</option>
                    <option value="tiki">TIKI</option>
                    <option value="sicepat">SiCepat</option>
                    <option value="jnt">J&T</option>
                </select>
                <input type="text" id="track-awb" placeholder="Masukkan Nomor Resi">
                <button id="btn-track" class="btn-wa" style="background:#3498db;">Lacak Sekarang</button>
            </div>
            <div id="track-result" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- Modal Login -->
    <div id="login-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close-btn" id="close-login">&times;</span>
            <h2 id="login-title">Login Member</h2>
            <div class="checkout-form">
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Password">
                <div style="text-align: right; margin-bottom: 10px;">
                    <a href="#" id="forgot-password" style="font-size: 0.8rem; color: #e74c3c; text-decoration: none;">Lupa Password?</a>
                </div>
                <button id="btn-submit-login" class="btn-wa" style="background:#3498db;">Login</button>
                <p style="margin-top:10px; text-align:center; font-size:0.9rem;">
                    Belum punya akun? <a href="#" id="toggle-register" style="color:#3498db;">Daftar disini</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Modal Riwayat Pesanan -->
    <div id="history-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-btn" id="close-history">&times;</span>
            <h2>Riwayat Pesanan Saya</h2>
            <div id="history-list" style="margin-top:15px;"></div>
            <button onclick="document.getElementById('history-modal').style.display='none'" class="btn-add" style="margin-top:15px; background:#95a5a6;">Tutup</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
